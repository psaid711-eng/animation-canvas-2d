<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Canvas Interactivo</title>
<link rel="shortcut icon" href="/assets/img/icono.png" type="image/x-icon" />
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="./assets/css.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark bg-opacity-75 backdrop-blur">
  <div class="container-fluid">
    <a class="navbar-brand">Canvas Pro</a>
  </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-4 glass p-4">

  <h3 class="text-center mb-4">Control de Simulación</h3>

  <!-- CONTROLES -->
  <div class="row g-3">

    <div class="col-md-4">
      <label>Ancho del Canvas</label>
      <input type="range" id="widthControl" min="300" max="1200" value="800" class="form-range">
    </div>

    <div class="col-md-4">
      <label>Alto del Canvas</label>
      <input type="range" id="heightControl" min="300" max="800" value="500" class="form-range">
    </div>

    <div class="col-md-4">
      <label>Cantidad de círculos</label>
      <input type="range" id="cantidad" min="1" max="50" value="5" class="form-range">
    </div>

  </div>

  <!-- CANVAS -->
  <div class="text-center mt-4">
    <canvas id="canvas"></canvas>
  </div>

</div>

<div class="col-md-4">
  <label>Efecto de lanzamiento</label>
  <select id="efecto" class="form-select">
    <option value="top-left">Esquina superior izquierda</option>
    <option value="top-right">Esquina superior derecha</option>
    <option value="bottom-left">Esquina inferior izquierda</option>
    <option value="bottom-right">Esquina inferior derecha</option>
    <option value="top">Desde arriba</option>
    <option value="bottom">Desde abajo</option>
  </select>
</div>

<!-- FOOTER -->
<footer class="text-center mt-5 p-3 glass">
  <p>Desarrollado por Martin Arturo | Animation-Canvas-2D</p>
</footer>

<script src="/assets/js/main.js"></script>
</body>
</html>
